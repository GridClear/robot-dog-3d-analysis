<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Model — SANA-WM → Gaussian Splat</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a22;
      --border: #2a3040;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #3b82f6;
      --ok: #22c55e;
      --err: #ef4444;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-columns: 400px 1fr;
    }
    @media (max-width: 900px) {
      body { grid-template-columns: 1fr; grid-template-rows: auto 60vh; }
    }
    aside {
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
      max-height: 100vh;
    }
    main {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #050508;
    }
    h1 { font-size: 1.15rem; margin: 0 0 4px; font-weight: 650; }
    .sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .drop {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 20px 14px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .drop:hover, .drop.dragover { border-color: var(--accent); background: rgba(59,130,246,0.06); }
    input[type="file"] { display: none; }
    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
      gap: 6px;
      margin-bottom: 12px;
      max-height: 120px;
      overflow-y: auto;
    }
    .thumbs img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .field { margin-bottom: 12px; }
    textarea, select, input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
    }
    textarea { min-height: 72px; resize: vertical; }
    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }
    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
    button.secondary { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
    .status-box {
      font-size: 0.82rem;
      padding: 10px;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .status-box.warn { border-color: var(--warn); color: var(--warn); }
    .status-box.err { border-color: var(--err); color: var(--err); }
    #queue { list-style: none; padding: 0; margin: 0; font-size: 0.82rem; }
    #queue li {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }
    #queue li.running { color: var(--accent); }
    #queue li.done { color: var(--ok); }
    #queue li.failed { color: var(--err); }
    #splatCanvas {
      flex: 1;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }
    .viewer-meta {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      color: var(--muted);
      font-size: 0.78rem;
      pointer-events: none;
    }
    .viewer-hint {
      position: absolute;
      right: 12px;
      top: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      color: var(--muted);
      font-size: 0.72rem;
      pointer-events: none;
    }
    label.check { text-transform: none; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text); }
  </style>
</head>
<body>
  <aside>
    <h1>World Model → Gaussian Splat</h1>
    <p class="sub">SANA-WM rolls camera; Pi3X lifts to 3D; you orbit the splat live.</p>

    <div id="sanaStatus" class="status-box">Loading config…</div>

    <label>Images (order preserved)</label>
    <div class="drop" id="dropZone">
      <p>Drop images or click to select</p>
      <small>JPEG/PNG/WebP · max height 720p</small>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple />
    <div class="thumbs" id="thumbs"></div>

    <div class="field">
      <label for="prompt">Scene prompt</label>
      <textarea id="prompt" placeholder="Describe the scene for the world model…"></textarea>
    </div>

    <div class="field">
      <label for="motion">Camera motion preset</label>
      <select id="motion"></select>
    </div>

    <div class="field">
      <label class="check">
        <input type="checkbox" id="loop" />
        Loop queue when finished
      </label>
    </div>

    <div class="row">
      <button class="primary" id="btnStart" disabled>Start stream</button>
      <button class="secondary" id="btnStop" disabled>Stop</button>
    </div>

    <ul id="queue"></ul>
  </aside>

  <main>
    <canvas id="splatCanvas"></canvas>
    <div class="viewer-hint">drag to orbit · scroll to zoom · right-drag to pan</div>
    <div class="viewer-meta" id="viewerMeta">No generation yet</div>
  </main>

  <script type="module">
    import * as SPLAT from "https://cdn.jsdelivr.net/npm/gsplat@latest/+esm";

    const state = {
      files: [],
      sessionId: null,
      eventSource: null,
      generationId: 0,
      config: null,
      scene: null,
      camera: null,
      renderer: null,
      controls: null,
    };

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const thumbs = document.getElementById('thumbs');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const canvas = document.getElementById('splatCanvas');
    const viewerMeta = document.getElementById('viewerMeta');
    const sanaStatus = document.getElementById('sanaStatus');
    const queueEl = document.getElementById('queue');
    const motion = document.getElementById('motion');
    const promptEl = document.getElementById('prompt');

    function initViewer() {
      state.scene = new SPLAT.Scene();
      state.camera = new SPLAT.Camera();
      state.renderer = new SPLAT.WebGLRenderer(canvas);
      state.controls = new SPLAT.OrbitControls(state.camera, canvas);
      const loop = () => {
        state.controls.update();
        state.renderer.render(state.scene, state.camera);
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }

    async function loadSplat(url) {
      // Replace the scene wholesale so old gaussians are released.
      state.scene = new SPLAT.Scene();
      await SPLAT.Loader.LoadAsync(url, state.scene);
    }

    async function loadConfig() {
      const r = await fetch('/v1/sessions/config');
      state.config = await r.json();
      motion.innerHTML = state.config.motion_presets
        .map(p => `<option value="${p}">${p.replace(/_/g, ' ')}</option>`)
        .join('');
      const interval = state.config.interval_sec;
      if (!state.config.sana_ready) {
        sanaStatus.className = 'status-box warn';
        sanaStatus.textContent = `SANA not ready: ${state.config.sana_note}. Run scripts/setup_sana_wm.sh`;
      } else {
        sanaStatus.className = 'status-box';
        sanaStatus.textContent =
          `Interval ~${interval}s · ${state.config.num_frames} frames @ ${state.config.fps} fps ` +
          `(≤${state.config.max_clip_seconds}s clip) · splat lifted with Pi3X`;
      }
    }

    function renderThumbs() {
      thumbs.innerHTML = '';
      state.files.forEach((f, i) => {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(f);
        img.title = `${i + 1}: ${f.name}`;
        thumbs.appendChild(img);
      });
      btnStart.disabled = state.files.length === 0 || !state.config?.sana_ready;
    }

    function addFiles(fileList) {
      for (const f of fileList) {
        if (f.type.startsWith('image/')) state.files.push(f);
      }
      renderThumbs();
    }

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      addFiles(fileInput.files);
      fileInput.value = '';
    });
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });

    function renderQueue(images) {
      if (!images?.length) {
        queueEl.innerHTML = '<li style="color:var(--muted)">No queue</li>';
        return;
      }
      queueEl.innerHTML = images.map(img => {
        const detail = img.n_gaussians
          ? `${img.status} · ${img.n_gaussians.toLocaleString()} g`
          : img.status;
        return `<li class="${img.status}"><span>#${img.index + 1} ${img.filename}</span><span>${detail}</span></li>`;
      }).join('');
    }

    function connectEvents(sessionId) {
      if (state.eventSource) state.eventSource.close();
      state.eventSource = new EventSource(`/v1/sessions/${sessionId}/events`);
      state.eventSource.onmessage = async ev => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.type === 'generation_ready') {
          state.generationId = msg.generation_id;
          const url = `${msg.url}?v=${msg.generation_id}`;
          try {
            await loadSplat(url);
            const g = msg.n_gaussians?.toLocaleString() ?? '?';
            viewerMeta.textContent =
              `Gen #${msg.index + 1} · ${g} gaussians · ${msg.elapsed_sec?.toFixed(1)}s · ` +
              `next in ${msg.next_in_sec?.toFixed(0)}s`;
          } catch (e) {
            viewerMeta.textContent = `Splat load failed: ${e}`;
          }
        }
        if (msg.type === 'generation_started') {
          viewerMeta.textContent = `Generating image #${msg.index + 1}…`;
        }
        if (msg.type === 'generation_failed') {
          viewerMeta.textContent = `Failed: ${msg.error}`;
          sanaStatus.className = 'status-box err';
          sanaStatus.textContent = msg.error;
        }
        if (['completed', 'stopped'].includes(msg.type)) {
          btnStop.disabled = true;
          btnStart.disabled = false;
        }
        refreshSession();
      };
    }

    async function refreshSession() {
      if (!state.sessionId) return;
      const r = await fetch(`/v1/sessions/${state.sessionId}`);
      if (!r.ok) return;
      const rec = await r.json();
      renderQueue(rec.images);
    }

    btnStart.addEventListener('click', async () => {
      const fd = new FormData();
      state.files.forEach(f => fd.append('files', f));
      fd.append('prompt', promptEl.value);
      fd.append('action', motion.value);
      fd.append('loop', document.getElementById('loop').checked ? 'true' : 'false');

      btnStart.disabled = true;
      try {
        const cr = await fetch('/v1/sessions', { method: 'POST', body: fd });
        if (!cr.ok) throw new Error(await cr.text());
        const created = await cr.json();
        state.sessionId = created.session_id;
        renderQueue(state.files.map((f, i) => ({ index: i, filename: f.name, status: 'pending' })));

        const sr = await fetch(`/v1/sessions/${state.sessionId}/start`, { method: 'POST' });
        if (!sr.ok) throw new Error(await sr.text());

        connectEvents(state.sessionId);
        btnStop.disabled = false;
        refreshSession();
      } catch (e) {
        sanaStatus.className = 'status-box err';
        sanaStatus.textContent = String(e);
        btnStart.disabled = false;
      }
    });

    btnStop.addEventListener('click', async () => {
      if (!state.sessionId) return;
      await fetch(`/v1/sessions/${state.sessionId}/stop`, { method: 'POST' });
      if (state.eventSource) state.eventSource.close();
      btnStop.disabled = true;
      btnStart.disabled = state.files.length > 0;
    });

    initViewer();
    loadConfig();
  </script>
</body>
</html>
